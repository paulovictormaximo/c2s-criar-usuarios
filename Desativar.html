<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C2S — Criação de Usuários</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #1F72EA;
      --blue-light: #EFF6FF;
      --blue-dark:  #1D4ED8;
      --text:       #0F172A;
      --muted:      #64748B;
      --border:     #E2E8F0;
      --bg:         #F8FAFC;
      --white:      #FFFFFF;
      --success:    #16A34A;
      --success-bg: #F0FDF4;
      --error:      #DC2626;
      --error-bg:   #FEF2F2;
      --radius:     12px;
      --shadow:     0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .screen {
      display: none;
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.28s ease both;
    }
    .screen.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px 36px;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: var(--blue);
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      margin-bottom: 28px;
    }

    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
    }
    .step-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s, width 0.2s;
    }
    .step-dot.active {
      background: var(--blue);
      width: 20px;
      border-radius: 3px;
    }
    .step-dot.done { background: var(--blue); opacity: 0.35; }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
    }

    .upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--blue); background: var(--blue-light); }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer;
    }
    .upload-icon {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
      color: var(--muted);
    }
    .upload-text { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .upload-text strong { color: var(--blue); font-weight: 500; }
    .upload-name {
      margin-top: 10px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      color: var(--blue);
      font-weight: 500;
      display: none;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      margin-top: 20px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn:hover { background: var(--blue-dark); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .btn-back {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      margin-bottom: 24px;
      transition: color 0.15s;
    }
    .btn-back:hover { color: var(--text); }

    .msg {
      display: none;
      font-size: 13px;
      padding: 10px 13px;
      border-radius: 8px;
      margin-top: 14px;
      line-height: 1.5;
    }
    .msg.show { display: block; }
    .msg.error   { background: var(--error-bg);   color: var(--error);   border: 1px solid #FECACA; }
    .msg.success { background: var(--success-bg); color: var(--success); border: 1px solid #BBF7D0; }
    .msg.info    { background: var(--blue-light);  color: var(--blue);    border: 1px solid #BFDBFE; }

    .token-preview {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--muted);
      margin-top: 8px;
      word-break: break-all;
      display: none;
    }

    .upload-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<!-- TELA 1 — LOGIN -->
<div class="screen active" id="screen-login">
  <div class="card">
    <div class="logo">C2S</div>
    <p class="card-title">Criação de Usuários</p>
    <div class="steps">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
    <div class="field">
      <label for="login-user">Usuário</label>
      <input type="text" id="login-user" placeholder="seu.usuario" autocomplete="username">
    </div>
    <div class="field">
      <label for="login-pass">Senha</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="msg error" id="msg-login"></div>
    <button class="btn" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<!-- TELA 2 — TOKEN -->
<div class="screen" id="screen-token">
  <div class="card">
    <button class="btn-back" onclick="irPara('screen-login')">← Voltar</button>
    <div class="logo">C2S</div>
    <p class="card-title">Token da empresa</p>
    <div class="steps">
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
    <div class="field">
      <label for="token-input">Token</label>
      <input type="text" id="token-input"
        placeholder="Cole ou digite o token aqui"
        oninput="previewToken(this.value)"
        autocomplete="off" spellcheck="false">
      <div class="token-preview" id="token-preview"></div>
    </div>
    <div class="msg error" id="msg-token"></div>
    <button class="btn" onclick="confirmarToken()">Continuar</button>
  </div>
</div>

<!-- TELA 3 — UPLOAD -->
<div class="screen" id="screen-upload">
  <div class="card">
    <button class="btn-back" onclick="irPara('screen-token')">← Voltar</button>
    <div class="logo">C2S</div>
    <p class="card-title">Enviar planilha</p>
    <div class="steps">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
    </div>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept=".csv,.xls,.xlsx" onchange="arquivoSelecionado(this)">
      <span class="upload-icon">↑</span>
      <div class="upload-text">
        <strong>Clique para selecionar</strong> ou arraste o arquivo aqui<br>
        CSV, XLS ou XLSX
      </div>
      <div class="upload-name" id="upload-name"></div>
    </div>
    <div class="msg error"   id="msg-upload"></div>
    <div class="msg success" id="msg-success"></div>
    <div class="msg info"    id="msg-enviando"></div>
    <button class="btn" id="btn-enviar" onclick="enviar()">Enviar planilha</button>
    <div class="upload-footer">
      <span>Token: <span id="label-token" style="font-family:'DM Mono',monospace; font-size:11px; color: var(--blue);">—</span></span>
    </div>
  </div>
</div>

<script>
  const WEBHOOK_URL = "https://n8n.vetraia.com/webhook/c2s-criar-usuarios";

  const USUARIOS = {
    "admin": "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918",
    "joao":  "HASH_DA_SENHA_DO_JOAO",
    "maria": "HASH_DA_SENHA_DA_MARIA",
  };

  async function hashSenha(senha) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(senha));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  // ── Navegação ──
  function irPara(tela) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    const el = document.getElementById(tela);
    el.classList.add("active");
    void el.offsetWidth;
  }

  // ── Login ──
  async function fazerLogin() {
    const user = document.getElementById("login-user").value.trim();
    const pass = document.getElementById("login-pass").value;

    document.getElementById("login-user").classList.remove("error");
    document.getElementById("login-pass").classList.remove("error");
    document.getElementById("msg-login").classList.remove("show");

    if (!user || !pass) {
      mostrarMsg("msg-login", "error", "Preencha usuário e senha.");
      return;
    }

    const hashDigitado = await hashSenha(pass);
    const hashEsperado = USUARIOS[user];

    if (!hashEsperado || hashDigitado !== hashEsperado) {
      mostrarMsg("msg-login", "error", "Usuário ou senha incorretos.");
      document.getElementById("login-user").classList.add("error");
      document.getElementById("login-pass").classList.add("error");
      return;
    }

    irPara("screen-token");
  }

  document.getElementById("login-pass").addEventListener("keydown", e => { if (e.key === "Enter") fazerLogin(); });
  document.getElementById("login-user").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("login-pass").focus(); });

  // ── Token ──
  let tokenAtual = "";

  function previewToken(val) {
    const preview = document.getElementById("token-preview");
    if (val.trim().length > 0) {
      preview.textContent = val.trim();
      preview.style.display = "block";
    } else {
      preview.style.display = "none";
    }
  }

  function confirmarToken() {
    const val = document.getElementById("token-input").value.trim();
    document.getElementById("token-input").classList.remove("error");
    document.getElementById("msg-token").classList.remove("show");

    if (!val) {
      document.getElementById("token-input").classList.add("error");
      mostrarMsg("msg-token", "error", "Informe o token da empresa antes de continuar.");
      return;
    }

    tokenAtual = val;
    document.getElementById("label-token").textContent = val.length > 18 ? val.slice(0, 16) + "…" : val;
    irPara("screen-upload");
  }

  document.getElementById("token-input").addEventListener("keydown", e => { if (e.key === "Enter") confirmarToken(); });

  // ── Upload ──
  const EXTENSOES_OK = ["csv", "xls", "xlsx"];
  let arquivoAtual = null;

  function arquivoSelecionado(input) {
    const file = input.files[0];
    limparMsgs();
    if (!file) return;

    const ext = file.name.split(".").pop().toLowerCase();
    if (!EXTENSOES_OK.includes(ext)) {
      mostrarMsg("msg-upload", "error", `Formato "${ext}" não suportado. Use CSV, XLS ou XLSX.`);
      input.value = "";
      arquivoAtual = null;
      document.getElementById("upload-name").style.display = "none";
      return;
    }

    arquivoAtual = file;
    const nome = document.getElementById("upload-name");
    nome.textContent = file.name;
    nome.style.display = "block";
  }

  const zona = document.getElementById("upload-zone");
  zona.addEventListener("dragover",  e => { e.preventDefault(); zona.classList.add("drag"); });
  zona.addEventListener("dragleave", () => zona.classList.remove("drag"));
  zona.addEventListener("drop", e => {
    e.preventDefault();
    zona.classList.remove("drag");
    const input = document.getElementById("file-input");
    input.files = e.dataTransfer.files;
    arquivoSelecionado(input);
  });

  // ── Enviar (base64) ──
  async function enviar() {
    limparMsgs();

    if (!arquivoAtual) {
      mostrarMsg("msg-upload", "error", "Selecione uma planilha antes de enviar.");
      return;
    }

    const btn = document.getElementById("btn-enviar");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Enviando…';
    mostrarMsg("msg-enviando", "info", "Enviando planilha para processamento…");

    try {
      // Converte arquivo para base64
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(arquivoAtual);
      });

      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          token: tokenAtual,
          arquivo: base64,
          nomeArquivo: arquivoAtual.name,
          tipoArquivo: arquivoAtual.type
        }),
      });

      if (!response.ok) throw new Error(`Erro ${response.status}`);

      const data = await response.json();
      limparMsgs();
      mostrarMsg("msg-success", "success",
        "Planilha enviada com sucesso! " +
        (data.total_criados ? `${data.total_criados} usuário(s) criado(s).` : "Aguarde o processamento.")
      );

      document.getElementById("file-input").value = "";
      document.getElementById("upload-name").style.display = "none";
      arquivoAtual = null;

    } catch (err) {
      limparMsgs();
      mostrarMsg("msg-upload", "error", "Falha ao enviar. Verifique sua conexão e tente novamente.");
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.innerHTML = "Enviar planilha";
    }
  }

  // ── Utilitários ──
  function mostrarMsg(id, tipo, texto) {
    const el = document.getElementById(id);
    el.className = `msg ${tipo} show`;
    el.textContent = texto;
  }

  function limparMsgs() {
    ["msg-upload", "msg-success", "msg-enviando"].forEach(id => {
      document.getElementById(id).classList.remove("show");
    });
  }
</script>
</body>
</html>
